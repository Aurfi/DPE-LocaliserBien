name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🔍 Run Biome linter
      run: npm run lint
      continue-on-error: false
    
    - name: 🧪 Run tests
      run: npm test -- --run
      continue-on-error: true
    
    - name: 🏗️ Build project
      run: |
        cat > .env << 'ENVEOF'
        VITE_SITE_URL=https://localiserbien.fr
        VITE_SITE_NAME=LocaliserBien
        VITE_SITE_DOMAIN=localiserbien.fr
        VITE_CONTACT_EMAIL=contact@localiserbien.fr
        VITE_GITHUB_URL=https://github.com/Aurfi/DPE-LocaliserBien
        VITE_DIRECTOR_NAME=AurFi
        VITE_TWITTER_HANDLE=@Aurfi
        VITE_ADEME_API_URL=https://data.ademe.fr/data-fair/api/v1/datasets/dpe03existant/lines
        VITE_GEO_API_URL=https://data.geopf.fr/geocodage
        VITE_APP_TITLE=Localisateur de bien immobilier - Trouvez l'adresse d'un bien
        VITE_APP_DESCRIPTION=Service gratuit de localisation de biens immobiliers en France. Retrouvez l'adresse exacte d'une annonce à partir des données DPE publiques.
        VITE_APP_KEYWORDS=localisation bien immobilier,DPE,adresse bien,recherche immobilier,diagnostic performance énergétique,France,localiser bien
        VITE_OG_TITLE=LocaliserBien - Trouvez l'adresse de n'importe quel bien immobilier
        VITE_OG_DESCRIPTION=Service gratuit de localisation de biens immobiliers en France à partir des données DPE publiques.
        VITE_TWITTER_TITLE=LocaliserBien - Trouvez l'adresse d'un bien immobilier
        VITE_TWITTER_DESCRIPTION=Service gratuit de localisation de biens immobiliers en France à partir des données DPE publiques.
        VITE_HOST_NAME=OVH
        VITE_HOST_ADDRESS=2 rue Kellermann, 59100 Roubaix, France
        VITE_ENABLE_ANALYTICS=false
        VITE_FANCY_UI=false
        VITE_DEV_PORT=3000
        ENVEOF
        npm run build
      env:
        CI: true
    
    - name: 📊 Check build output
      run: |
        echo "Build completed successfully!"
        echo "Checking dist folder..."
        ls -la dist/
        echo "Build size:"
        du -sh dist/
    
    - name: 📝 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/
        retention-days: 7

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: 🔒 Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: 🔍 Check for sensitive data
      run: |
        echo "Checking for potential secrets..."
        # Check for potential API keys or passwords
        ! grep -r "AIzaSy" --include="*.js" --include="*.vue" --include="*.ts" --exclude-dir=node_modules --exclude-dir=dist src/ || echo "Warning: Potential API key found"
        ! grep -r "password.*=.*['\"]" --include="*.js" --include="*.vue" --include="*.ts" --exclude-dir=node_modules --exclude-dir=dist src/ || echo "Warning: Potential hardcoded password found"
        echo "Security check completed"

  deploy:
    name: Deploy to FTP
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: 📥 Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: dist/

    - name: 🚀 Deploy to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: dist/
        server-dir: ./www/